<!DOCTYPE html>
<html lang="">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="icon" href="<%= BASE_URL %>favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300&display=swap" rel="stylesheet">
  <title>
    <%= htmlWebpackPlugin.options.title %>
  </title>
</head>

<body>
  <noscript>
    <strong>We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work properly without JavaScript enabled.
        Please enable it to continue.</strong>
  </noscript>
  <div id="app" onmousemove="switchBetweenViews()"></div>
  <!-- built files will be auto injected -->
  <div id="admin"></div>
</body>

</html>

<script rel="text/js">
  let switchBetweenViews = () => {
    let adminRQ = (this.location.href === "http://localhost:8888/admin" || this.location.href === "http://127.0.0.1:8888/admin" || this.location.hred === "https://iut-onboardin.netlify.app/admin");
    if (adminRQ) {
      document.getElementById("app").style.visibility = "hidden";
      document.getElementById("admin").style.visibility = "visible";
    }
  }
</script>

<style>
  #admin {
    visibility: hidden;
  }
</style>
